name: ollama-bearer-auth

services:
  ollama:
    build:
      context: .
      dockerfile: Dockerfile
    image: "${IMAGE_OWNER}/${IMAGE_NAME}:${CUDA_VERSION}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "${EXPOSED_OLLAMA_PORT}:8081"
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ~/.ollama:/root/.ollama
    restart: unless-stopped
